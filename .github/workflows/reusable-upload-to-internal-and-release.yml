name: "[Reusable] Upload to Internal and Create Draft Release"

on:
    workflow_call:
        inputs:
            upload-artifact:
                description: "Artifact name of the AAB file to upload"
                type: string
                required: true
            version-name:
                description: "Version name used for the draft release tag (e.g. 2026.2.0)"
                type: string
                required: true
            mapping-file:
                description: "Optional artifact name of the ProGuard mapping file"
                type: string
                required: false
                default: ""

jobs:
    upload-and-release:
        runs-on: ubuntu-latest

        environment: Internal

        permissions:
            contents: write

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Download AAB artifact
                uses: actions/download-artifact@v8
                with:
                    name: ${{ inputs.upload-artifact }}

            -   name: Encode service account credentials as base64
                id: encode-creds
                env:
                    GOOGLE_API_KEY_JSON: ${{ secrets.GOOGLE_API_KEY_JSON }}
                run: |
                    b64=$(printf '%s' "$GOOGLE_API_KEY_JSON" | base64 -w 0)
                    echo "::add-mask::$b64"
                    echo "b64=$b64" >> "$GITHUB_OUTPUT"

            -   name: Upload AAB to Google Play Internal and download universal APK
                id: upload-play
                uses: TianchenWei/upload-aab-google-play@1b070738058f58636b4a5c92ece8bc89fc7e4910 # main
                with:
                    service-account-credential-base64: ${{ steps.encode-creds.outputs.b64 }}
                    package-name: com.simprints.id
                    aab-file-path: ${{ inputs.upload-artifact }}

            -   name: Rename universal APK
                id: rename-apk
                env:
                    VERSION_NAME: ${{ inputs.version-name }}
                    UNIVERSAL_APK_PATH: ${{ steps.upload-play.outputs.universal-apk-file-path }}
                run: |
                    APK_NAME="simprints-id-${VERSION_NAME}-universal.apk"
                    mv "$UNIVERSAL_APK_PATH" "$APK_NAME"
                    echo "apk-name=$APK_NAME" >> "$GITHUB_OUTPUT"

            -   name: Download mapping file
                if: ${{ inputs.mapping-file != '' }}
                uses: actions/download-artifact@v8
                with:
                    name: ${{ inputs.mapping-file }}

            -   name: Create draft GitHub release with universal APK
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    VERSION_NAME: ${{ inputs.version-name }}
                    MAPPING_FILE: ${{ inputs.mapping-file }}
                    APK_NAME: ${{ steps.rename-apk.outputs.apk-name }}
                run: |
                    TAG="v${VERSION_NAME}"

                    ASSETS=("$APK_NAME")
                    if [[ -n "$MAPPING_FILE" && -f "$MAPPING_FILE" ]]; then
                        ASSETS+=("$MAPPING_FILE")
                    fi

                    gh release create "$TAG" \
                        --repo "$GITHUB_REPOSITORY" \
                        --title "Simprints ID ${VERSION_NAME}" \
                        --draft \
                        --generate-notes \
                        "${ASSETS[@]}"
