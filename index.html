<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simprints ID — Release Dashboard</title>
  <style>
    :root {
      --bg:       #0f172a;
      --card:     #1e293b;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --border:   #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
    }
    header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 1.625rem;
      border-top: 4px solid var(--accent);
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .env-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .version {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .version-empty {
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
    }
    .updated {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 0.625rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 7px;
      font-size: 0.84rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border); }
    .btn-disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }
    footer {
      text-align: center;
      margin-top: 3.5rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>🔬 Simprints ID</h1>
    <p>Release Status Dashboard</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <p>
      Auto-updated by CI &middot;
      <a href="https://github.com/Simprints/Android-Simprints-ID" target="_blank" rel="noopener">GitHub Repository</a>
    </p>
  </footer>

  <script>
    const ENVIRONMENTS = [
      { key: 'production',       label: 'Production',       accent: '#22c55e' },
      { key: 'delivery_testing', label: 'Delivery Testing', accent: '#f59e0b' },
      { key: 'internal_testing', label: 'Internal Testing', accent: '#3b82f6' },
    ];

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZone: 'UTC',
      }) + ' UTC';
    }

    function renderCard(env, data) {
      const version    = data?.version    || null;
      const apkUrl     = data?.apk_url    || null;
      const releaseUrl = data?.release_url|| null;
      const updatedAt  = data?.updated_at || null;

      const versionHtml = version
        ? `<div class="version">${version}</div>`
        : `<div class="version-empty">No release yet</div>`;

      const updatedHtml = version && updatedAt
        ? `<div class="updated">Updated ${formatDate(updatedAt)}</div>`
        : `<div class="updated"></div>`;

      const apkBtn = apkUrl
        ? `<a class="btn btn-primary" href="${apkUrl}" download>⬇&nbsp;Download APK</a>`
        : `<span class="btn btn-primary btn-disabled">⬇&nbsp;Download APK</span>`;

      const releaseBtn = releaseUrl
        ? `<a class="btn btn-secondary" href="${releaseUrl}" target="_blank" rel="noopener">📋&nbsp;Release Notes</a>`
        : `<span class="btn btn-secondary btn-disabled">📋&nbsp;Release Notes</span>`;

      return `
        <div class="card" style="--accent: ${env.accent}">
          <div class="card-header">
            <div class="dot"></div>
            <span class="env-label">${env.label}</span>
          </div>
          ${versionHtml}
          ${updatedHtml}
          <div class="actions">
            ${apkBtn}
            ${releaseBtn}
          </div>
        </div>`;
    }

    async function load() {
      let status = {};
      try {
        const res = await fetch('status.json?_=' + Date.now());
        status = await res.json();
      } catch (e) {
        console.error('Failed to load status.json:', e);
      }
      document.getElementById('grid').innerHTML =
        ENVIRONMENTS.map(env => renderCard(env, status[env.key])).join('');
    }

    load();
  </script>
</body>
</html>
